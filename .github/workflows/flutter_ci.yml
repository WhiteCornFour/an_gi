name: Flutter Code Quality & Test CI

# Tự động kích hoạt khi có thay đổi trên nhánh main hoặc các nhánh tính năng
on:
  push:
    branches: [ main, master, "feature/**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  analyze_and_test:
    name: Scan & Test Codebase
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy mã nguồn từ GitHub về môi trường ảo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Bước 2: Thiết lập môi trường Java (bắt buộc để xây dựng/kiểm tra Flutter)
      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Bước 3: Thiết lập Flutter SDK (Tự động chọn phiên bản ổn định ổn định nhất)
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Bật cache để tăng tốc độ chạy CI cho các lần sau

      # Bước 4: Tải toàn bộ thư viện đã khai báo trong pubspec.yaml (Dio, BLoC, Supabase...)
      - name: Install Dependencies
        run: flutter pub get

      # Bước 5: KIỂM TRA THIẾT QUÂN LUẬT 1 - Kiểm tra định dạng code (Formatting)
      # Nếu code thụt lề sai, thiếu dấu phẩy chuẩn Flutter, CI sẽ BÁO ĐỎ lập tức.
      - name: Check Code Formatting
        run: dart format --output=none --set-exit-if-changed lib/

      # Bước 6: KIỂM TRA THIẾT QUÂN LUẬT 2 - Phân tích cú pháp (Linter & Static Analysis)
      # Phát hiện các lỗi như: Hardcoded string (chưa qua Locale), quên bóc tách widget, lỗi logic ẩn.
      - name: Analyze Code Quality
        run: flutter analyze

      # Bước 7: CHẠY BỘ KIỂM THỬ THẦN TỐC (Unit Test & Widget Test)
      # Đảm bảo các hàm tính toán, bộ não BLoC "Khóa & Xoay" hoạt động đúng logic.
      # - name: Run Unit & Widget Tests
      #   run: flutter test --coverage